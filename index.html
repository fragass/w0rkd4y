<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9969980794780268"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workday CNX</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="css/loginf.css">
</head>
<body>

  <div class="login-card">
    <form id="loginForm">
      <input type="text" id="username" placeholder="Usuário" autocomplete="off" required>
      <input type="password" id="password" placeholder="Senha" autocomplete="off" required>
      <button type="submit">Entrar</button>
    </form>

    <div class="key-entry">
      <button type="button" id="toggleKeyBtn" class="link-btn">Validar key</button>
    </div>

    <div id="keyPanel" class="key-panel" hidden>
      <div class="section-label">Criar conta por convite</div>
      <div id="keySection">
        <div class="inline-field-row">
          <input type="text" id="keyInput" placeholder="Cole sua key" autocomplete="off" maxlength="64">
          <button type="button" id="validateKeyBtn">Validar</button>
        </div>
        <p id="keyMsg" class="helper-text"></p>
      </div>

      <form id="registerForm" class="register-form" hidden>
        <div class="section-label success">Key validada</div>
        <input type="text" id="registerUsername" placeholder="Novo usuário" autocomplete="off" maxlength="24" required>
        <input type="password" id="registerPassword" placeholder="Nova senha" autocomplete="off" maxlength="80" required>
        <button type="submit">Criar conta</button>
      </form>
    </div>

    <p id="errorMsg"></p>
  </div>

  <script src="js/loginf.js"></script>
</body>
</html>
