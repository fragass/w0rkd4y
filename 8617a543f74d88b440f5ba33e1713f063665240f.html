<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="favicon.png" type="image/png">
  <script>
    if (!sessionStorage.getItem("token") || !sessionStorage.getItem("loggedUser")) {
      window.location.href = "index.html";
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Inicial - Workday</title>
  
  <link rel="stylesheet" href="css/main.css">
  
</head>

<body>
  <div id="welcome-screen">
    <div class="welcome-card">
      <img id="welcome-avatar" alt="Foto do perfil">
      <h1 id="welcome-title">Olá</h1>
      <p id="welcome-subtitle">Bem-vindo de volta</p>
    </div>
  </div>

  <div id="mini-profile">
    <div class="mini-profile-avatar-wrap">
      <img id="mini-profile-avatar" alt="Avatar do usuário">
      <div class="mini-profile-status"></div>
    </div>

    <div class="mini-profile-info">
      <span id="user-display-name"></span>
      <small id="user-phone"></small>
    </div>

    <svg id="arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </div>

  <div id="dropdown-menu">
    <div class="dropdown-card">
      <div class="dropdown-profile-top">
        <img id="dropdown-avatar" alt="Avatar do usuário">
        <div class="dropdown-user-meta">
          <strong id="dropdown-display-name"></strong>
          <span id="dropdown-username"></span>
        </div>
      </div>

      <label class="dropdown-upload-btn" for="profile-avatar-input">
        Trocar foto
      </label>
      <input type="file" id="profile-avatar-input" accept="image/png,image/jpeg,image/webp" hidden>

      <button id="logout" class="logout-btn">
        <span>Sair da conta</span>
      </button>
    </div>
  </div>

  <audio id="messageSound" src="message.mp3" preload="auto"></audio>

  <div class="online-box">
    <div class="online-header">
      <div class="online-dot"></div>
      <span id="onlineUsers">0</span>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <div class="header-left">
        <span class="warning-text" id="headerTitle"></span>
        <span id="typingStatus"></span>
      </div>
      <a href="admin.html" class="admin-link" id="adminPanelLink" aria-label="Abrir painel admin">🔒</a>
    </div>

    <div class="messages" id="messages"></div>

    <div class="form">
      <div class="reply-bar" id="replyBar">
        <div class="reply-text" id="replyBarText"></div>
        <button type="button" id="cancelReplyBtn">Cancelar</button>
      </div>

      <textarea id="content" placeholder="Escreva uma mensagem... (use CTRL + V para enviar imagens)"></textarea>
      <button type="button" id="cancelImageBtn" title="Cancelar imagem anexada" aria-label="Cancelar imagem anexada">✕</button>
      <span class="emoji-toggle" onclick="toggleEmojis()">🙂</span>
      <button class="send-btn" onclick="sendMessage()">Enviar</button>
      <div class="emoji-panel" id="emojiPanel"></div>
    </div>
  </div>

  <span style="position:fixed; bottom:10px; left:10px; opacity:.6; font-size:11px; z-index:999;">
    v1.3.0.2026.03.14
  </span>

  <div id="logout-modal" class="confirm-modal" aria-hidden="true">
    <div class="confirm-modal-backdrop"></div>

    <div class="confirm-modal-card" role="dialog" aria-modal="true" aria-labelledby="logout-modal-title">
      <div class="confirm-modal-icon">⚠️</div>
      <h3 id="logout-modal-title">Sair da conta?</h3>
      <p>Você tem certeza que deseja encerrar sua sessão agora?</p>

      <div class="confirm-modal-actions">
        <button type="button" id="cancel-logout" class="confirm-btn confirm-btn-secondary">Cancelar</button>
        <button type="button" id="confirm-logout" class="confirm-btn confirm-btn-danger">Sair</button>
      </div>
    </div>
  </div>

  <div id="clearall-modal" class="clearall-modal" aria-hidden="true">
    <div class="clearall-backdrop"></div>

    <div class="clearall-card" role="dialog" aria-modal="true" aria-labelledby="clearall-title">
      <div class="clearall-icon">🗑️</div>
      <h3 id="clearall-title">Limpar tudo?</h3>
      <p>Isso vai apagar todas as mensagens para todos. Essa ação não pode ser desfeita.</p>

      <div class="clearall-actions">
        <button type="button" id="clearall-cancel" class="clearall-btn clearall-btn-secondary">Cancelar</button>
        <button type="button" id="clearall-confirm" class="clearall-btn clearall-btn-danger">Limpar tudo</button>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/main.js"></script>
  
</body>
</html>
